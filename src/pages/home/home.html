<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ex-fs.net | MovieList Extension</title>
    <link rel="stylesheet" href="../../shared/styles/common.css">
    <link rel="stylesheet" href="../../shared/styles/theme.css">
    <link rel="stylesheet" href="../../shared/styles/components.css">
    <link rel="stylesheet" href="../../shared/styles/navigation.css">
    <link rel="stylesheet" href="../../shared/styles/movie-card.css">
    <link rel="stylesheet" href="home.css">

    <!-- Resource Hints -->
    <link rel="preload" as="script" href="../../../libs/firebase-app-compat.js">
    <link rel="preconnect" href="https://firebaseio.com">
    <link rel="preconnect" href="https://firebasestorage.googleapis.com">
    <link rel="dns-prefetch" href="https://ex-fs.net">
    <link rel="stylesheet" href="../../shared/styles/report-widget.css">
</head>
<body>

    <!-- Debug: Clear Cache Button -->
    <button id="clearCacheBtn" style="position: fixed; top: 80px; right: 20px; z-index: 9999; padding: 10px 16px; background: #ef4444; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; box-shadow: 0 4px 8px rgba(0,0,0,0.3);">
        🗑️ Clear Cache
    </button>

    <div class="container">
        <!-- Loading State -->
        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <p>Loading content from ex-fs.net...</p>
        </div>

        <!-- Error State -->
        <div id="error-screen" class="error-container" style="display: none;">
            <div class="error-icon">⚠️</div>
            <h2>Connection Failed</h2>
            <p id="error-message">Could not fetch data from ex-fs.net</p>
            <button id="retry-btn" class="retry-button">Try Again</button>
        </div>

        <!-- Content Area -->
        <div id="content" class="content-container" style="display: none;">
            
            <!-- Featured Slider -->
            <section class="featured-slider-section">
                <div class="featured-slider-container" id="featured-slider">
                    <!-- Featured slider items injected here -->
                </div>
                <!-- Pagination Dots -->
                <div class="slider-pagination" id="slider-pagination">
                    <!-- Dots will be generated by JS -->
                </div>
            </section>
            
            <!-- Films Section -->
            <section id="films-section" class="category-section">
                <div class="section-header">
                    <h2>Фильмы</h2>
                </div>
                <!-- Grid -->
                <div class="grid-container" id="films-grid">
                    <!-- Grid items injected here -->
                </div>
            </section>

            <!-- Series Section -->
            <section id="series-section" class="category-section">
                <div class="section-header">
                    <h2>Сериалы</h2>
                </div>
                <div class="grid-container" id="series-grid"></div>
            </section>

            <!-- Cartoons Section -->
            <section id="cartoons-section" class="category-section">
                <div class="section-header">
                    <h2>Мультфильмы</h2>
                </div>
                <div class="grid-container" id="cartoons-grid"></div>
            </section>

            <!-- TV Shows Section -->
            <section id="tvShows-section" class="category-section">
                <div class="section-header">
                    <h2>Передачи и шоу</h2>
                </div>
                <div class="grid-container" id="tvShows-grid"></div>
            </section>

        </div>
    </div>

    <!-- Scripts -->
    <script defer src="../../../libs/firebase-app-compat.js"></script>
    <script defer src="../../../libs/firebase-auth-compat.js"></script>
    <script defer src="../../../libs/firebase-firestore-compat.js"></script>
    <script defer src="../../shared/firestore.js"></script>
    <script defer src="../../shared/services/UserService.js"></script>
    <script defer src="../../shared/services/WatchlistService.js"></script>
    <script defer src="../../shared/services/FavoriteService.js"></script>
    <script defer src="../../shared/services/CollectionService.js"></script>
    <script defer src="../../shared/utils/Utils.js"></script>
    <script defer src="../../shared/utils/IconUtils.js"></script>
    <script defer src="../../shared/utils/Icons.js"></script>
    <script defer src="../../shared/components/Navigation.js"></script>
    <script defer src="home.js"></script>
    <script defer src="../../shared/components/ReportWidget.js"></script>
</body>
</html>

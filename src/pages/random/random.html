<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Movie - Movie Service</title>
    <link rel="stylesheet" href="../../shared/styles/common.css">
    <link rel="stylesheet" href="../../shared/styles/theme.css">
    <link rel="stylesheet" href="../../shared/styles/components.css">
    <link rel="stylesheet" href="../../shared/styles/navigation.css">
    <link rel="stylesheet" href="../../shared/styles/poster-fixes.css">
    <link rel="stylesheet" href="../../shared/styles/movie-card.css">
    <link rel="stylesheet" href="random.css">
    <link rel="stylesheet" href="../../shared/styles/report-widget.css">
</head>
<body>
    <!-- Navigation will be inserted here by Navigation.js -->

    <div class="main-container fade-in">


        <!-- Configuration Section (Top) -->
        <div class="config-section">
            <div class="config-card">
                <div class="config-header" id="configHeader">
                    <div class="config-title-wrapper">
                        <h2 data-i18n="random.config.title">Configuration</h2>
                    </div>
                    <button id="toggleConfigBtn" class="btn btn-icon-only toggle-btn" title="Toggle Filters">
                        <span class="icon-chevron"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="padding-top:5px"><polyline points="6 9 12 15 18 9"></polyline></svg></span>
                    </button>
                </div>
                
                <div class="config-body collapsed" id="configBody">
                    <div class="config-actions-row">
                        <button id="resetFiltersBtn" class="btn btn-text-icon" title="Reset Filters" data-i18n="random.config.reset">
                            <span class="btn-text">Сбросить фильтры</span>
                            <span class="icon-refresh"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg></span>
                        </button>
                    </div>
                    <div class="config-grid">
                        <div class="filter-group">
                            <label><span class="label-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></span> <span data-i18n="random.config.year_range">Year Range</span></label>
                            
                            <div class="range-slider-container" id="yearSlider">
                                <div class="slider-values">
                                    <span id="yearMinDisplay">1990</span>
                                    <span id="yearMaxDisplay">2026</span>
                                </div>
                                <div class="slider-track-wrapper">
                                    <div class="slider-track"></div>
                                    <div class="slider-range" id="yearRangeBar"></div>
                                    <input type="range" id="yearFrom" min="1900" max="2030" value="1990" class="range-input min-range">
                                    <input type="range" id="yearTo" min="1900" max="2030" value="2026" class="range-input max-range">
                                </div>
                                <div class="slider-labels">
                                    <span><span data-i18n="random.config.min">Min</span>: 1900</span>
                                    <span><span data-i18n="random.config.max">Max</span>: 2030</span>
                                </div>
                            </div>
                        </div>

                        <div class="filter-group">
                            <label><span class="label-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg></span> <span data-i18n="random.config.rating">Rating (Kinopoisk)</span></label>
                            
                            <div class="range-slider-container" id="ratingSlider">
                                <div class="slider-values">
                                    <span id="ratingMinDisplay">7.0</span>
                                    <span id="ratingMaxDisplay">10.0</span>
                                </div>
                                <div class="slider-track-wrapper">
                                    <div class="slider-track"></div>
                                    <div class="slider-range" id="ratingRangeBar"></div>
                                    <input type="range" id="ratingFrom" min="1" max="10" step="0.1" value="7" class="range-input min-range">
                                    <input type="range" id="ratingTo" min="1" max="10" step="0.1" value="10" class="range-input max-range">
                                </div>
                                <div class="slider-labels">
                                    <span><span data-i18n="random.config.min">Min</span>: 1.0</span>
                                    <span><span data-i18n="random.config.max">Max</span>: 10.0</span>
                                </div>
                            </div>
                        </div>

                        <div class="filter-group">
                            <label><span class="label-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg></span> <span data-i18n="random.config.votes">Votes Count</span></label>
                            
                            <div class="range-slider-container" id="votesSlider">
                                <div class="slider-values">
                                    <span id="votesMinDisplay">10 000</span>
                                    <span id="votesMaxDisplay">2 000 000</span>
                                </div>
                                <div class="slider-track-wrapper">
                                    <div class="slider-track"></div>
                                    <div class="slider-range" id="votesRangeBar"></div>
                                    <input type="range" id="votesFrom" min="0" max="2000000" step="1000" value="10000" class="range-input min-range">
                                    <input type="range" id="votesTo" min="0" max="2000000" step="1000" value="2000000" class="range-input max-range">
                                </div>
                                <div class="slider-labels">
                                    <span><span data-i18n="random.config.min">Min</span>: 0</span>
                                    <span><span data-i18n="random.config.max">Max</span>: 2M+</span>
                                </div>
                            </div>
                        </div>

                        <div class="filter-group wide-group">
                            <label><span class="label-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="13" rx="2" ry="2"></rect><path d="M16 6 22 2"></path><path d="M22 6 2 6"></path><path d="M7 6 2 2"></path><path d="M12 6 7 2"></path><path d="M17 6 12 2"></path></svg></span> <span data-i18n="random.config.type">Type</span> <span class="hint" data-i18n="random.config.hint">(Include / Exclude)</span></label>
                            <div class="tags-grid" id="typeTags">
                                <!-- Populated by JS -->
                            </div>
                        </div>

                        <div class="filter-group wide-group">
                            <label><span class="label-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 100 100" fill="currentColor"><path d="M43.309 79.586c.012.422-.148.832-.445 1.137a1.566 1.566 0 0 1-2.25 0 1.57 1.57 0 0 1-.446-1.137c0-3.348-3.543-6.07-7.898-6.07s-7.898 2.722-7.898 6.07a1.57 1.57 0 0 1-1.57 1.57 1.57 1.57 0 0 1-1.575-1.57c0-5.078 4.953-9.21 11.043-9.21 6.086 0 11.04 4.128 11.04 9.21m6.246-24.363a1.57 1.57 0 0 0-1.57 1.57 4.437 4.437 0 0 1-8.871 0 1.57 1.57 0 0 0-3.14 0 7.577 7.577 0 1 0 15.152 0 1.566 1.566 0 0 0-1.57-1.57m-23.016 1.57a1.573 1.573 0 0 0-2.7-1.137 1.58 1.58 0 0 0-.44 1.137 4.437 4.437 0 1 1-8.875 0 1.576 1.576 0 0 0-1.57-1.613 1.56 1.56 0 0 0-1.126.477 1.57 1.57 0 0 0-.445 1.136 7.578 7.578 0 1 0 15.156 0m72.148-21.09c.09 9.188-3.437 16.617-10.488 22.094-.043.035-.078.063-.121.102a1.5 1.5 0 0 1-.555.32c-.05.016-.093.031-.148.055a27.2 27.2 0 0 1-10.32 2.11 28.4 28.4 0 0 1-16.18-5.434c-.844 11.832-3.258 21.348-7.207 28.352-4.914 8.71-12.285 13.797-21.914 15.12-.063.008-.11.02-.18.032l.004-.004a1.5 1.5 0 0 1-.644 0c-.063-.012-.11-.023-.18-.031-9.625-1.32-17-6.41-21.91-15.117-4.79-8.492-7.324-20.668-7.531-36.207l-.004.004a4.2 4.2 0 0 1 2.129-3.653 57.5 57.5 0 0 1 27.742-8.828h.148c4.293.2 8.55.903 12.684 2.094q-1.799-2.69-3.574-5.668a3.98 3.98 0 0 1 .012-4A52.7 52.7 0 0 1 58.427 7.325q.06-.04.125-.074a52.73 52.73 0 0 1 26.066-5.707 3.97 3.97 0 0 1 3.468 1.992c6.946 12.41 10.516 23.234 10.602 32.168zM58.058 47.055c0-.136.008-.547-.633-.941h-.004a54.45 54.45 0 0 0-26.168-8.36A54.5 54.5 0 0 0 5.085 46.11c-.64.395-.636.809-.632.941.199 15 2.597 26.676 7.125 34.703 4.468 7.918 10.879 12.352 19.602 13.555l.074.012.07-.012c8.723-1.199 15.137-5.632 19.602-13.555 4.531-8.023 6.93-19.699 7.133-34.699zm37.488-11.32c-.086-8.402-3.516-18.723-10.203-30.668-.058-.101-.207-.367-.82-.386l.004.003a49.6 49.6 0 0 0-24.47 5.325A49.7 49.7 0 0 0 43.21 28.536c-.293.539-.133.804-.075.902 1.942 3.262 3.922 6.273 5.891 8.973v-.004a62 62 0 0 1 10.043 5.035 4.19 4.19 0 0 1 2.125 3.656q-.029 2.11-.11 4.13c8.259 6.3 16.478 7.651 25.11 4.136l.043-.02.039-.031c6.32-4.906 9.351-11.312 9.27-19.578m-12.414-4.93a1.57 1.57 0 0 0-.574 2.145c1.492 2.586-.047 6.277-3.43 8.235a8.17 8.17 0 0 1-5.297 1.097 4.8 4.8 0 0 1-3.547-2.242 1.57 1.57 0 0 0-2.144-.578 1.576 1.576 0 0 0-.578 2.148 7.9 7.9 0 0 0 5.781 3.778c.516.078 1.043.12 1.566.12a11.64 11.64 0 0 0 5.786-1.6c4.89-2.821 6.937-8.438 4.578-12.524a1.57 1.57 0 0 0-2.14-.578zm-15.312 1a7.06 7.06 0 0 0-9.648-2.581 7.06 7.06 0 0 0-2.582 9.644 1.567 1.567 0 0 0 2.16.606 1.565 1.565 0 0 0 .558-2.172 3.922 3.922 0 0 1 6.793-3.922 1.57 1.57 0 0 0 2.72-1.57zM83 17.28a7.064 7.064 0 0 0-7.945 10.351 1.572 1.572 0 1 0 2.722-1.57 3.923 3.923 0 0 1 1.453-5.32 3.926 3.926 0 0 1 5.34 1.402 1.574 1.574 0 0 0 2.125.539c.735-.426 1-1.363.594-2.113A7.02 7.02 0 0 0 83 17.278z"/></svg></span> <span data-i18n="random.config.genres">Genres</span> <span class="hint" data-i18n="random.config.hint">(Include / Exclude)</span></label>
                            <div class="tags-grid" id="genreTags">
                                <!-- Populated by JS -->
                            </div>
                        </div>

                        <div class="filter-group wide-group">
                            <label><span class="label-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg></span> <span data-i18n="random.config.countries">Countries</span></label>
                            <div class="tags-grid" id="countryTags">
                                <!-- Populated by JS -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Result Section (Center) -->
        <div class="result-section">
            <div class="result-container" id="resultContainer">
                <div id="initialState" class="result-placeholder centered-placeholder">
                    <div class="placeholder-icon-animated">
                        <img src="../../../icons/icon128-white.png" alt="Dice Icon" class="theme-icon">
                    </div>
                    <h3 data-i18n="random.states.ready_title">Ready to roll?</h3>
                    <p data-i18n="random.states.ready_subtitle">Configure filters to your mood</p>
                    
                    <button id="rollDiceBtn" class="btn btn-primary-gradient btn-large pulse-animation main-action-btn">
                        <span class="btn-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><circle cx="16" cy="16" r="2"></circle><circle cx="16" cy="8" r="2"></circle><circle cx="8" cy="16" r="2"></circle><circle cx="8" cy="8" r="2"></circle><circle cx="12" cy="12" r="2"></circle></svg></span>
                        <span data-i18n="random.states.roll_btn">Find Movie</span>
                    </button>
                </div>

                <div id="loadingState" class="loading-state" style="display: none;">
                    <div class="spinner-modern"></div>
                    <p data-i18n="random.states.searching">Searching specifically for you...</p>
                </div>

                <div id="movieResult" class="movie-result" style="display: none;">
                    <!-- Movie card injection -->
                </div>
                
                <div id="errorState" class="error-state" style="display: none;">
                    <div class="error-icon"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M16 16s-1.5-2-4-2-4 2-4 2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg></div>
                    <p class="error-text">
                        <span data-i18n="random.states.no_movie">No movie found with these criteria.</span><br>
                        <span data-i18n="random.states.relax_filters">Try relaxing the filters.</span>
                    </p>
                    <button id="tryAgainBtn" class="btn btn-primary-gradient mt-4" data-i18n="random.states.try_again">Try Again</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../../../libs/firebase-app-compat.js"></script>
    <script src="../../../libs/firebase-firestore-compat.js"></script>
    <script src="../../../libs/firebase-auth-compat.js"></script>
    <script src="../../shared/config/kinopoisk.config.js"></script>
    <script src="../../shared/services/KinopoiskService.js"></script>
    <script src="../../shared/services/ImdbParsingService.js"></script>
    <script src="../../shared/services/UserService.js"></script>
    <script src="../../shared/services/RatingService.js"></script>
    <script src="../../shared/services/CollectionService.js"></script>
    <script src="../../shared/services/FavoriteService.js"></script>
    <script src="../../shared/services/WatchlistService.js"></script>
    <script src="../../shared/services/WatchingService.js"></script>
    <script src="../../shared/utils/helpers.js"></script>
    <script src="../../shared/utils/IconUtils.js"></script>
    <script src="../../shared/utils/Icons.js"></script>
    <script src="../../shared/utils/Utils.js"></script>
    <script src="../../shared/components/Navigation.js"></script>
    <script src="../../shared/firestore.js"></script>
    <script src="../../shared/components/MovieCard.js"></script>
    <script src="random.js" type="module"></script>
    <script defer src="../../shared/components/ReportWidget.js"></script>
</body>
</html>
